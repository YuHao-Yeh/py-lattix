[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lattix"
version = "0.1.0"
description = "A high-performance, hierarchical, thread-safe mapping library for Python."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "YuHao-Yeh", email = "yuhao200.ok@gmail.com"}
]
keywords = ["hierarchical", "config", "mapping", "dot-access", "attrdict, "thread-safe"]
dependencies = [
    "typing-extensions>=4.0; python_version < '3.10'",
]

[project.optional-dependencies]
yaml = ["pyyaml>=6.0"]
msgpack = ["msgpack>=1.0"]
orjson = ["orjson>=3.0"]
full = [
    "pyyaml>=6.0",
    "msgpack>=1.0",
    "orjson>=3.0",
    "numpy",
    "pandas"
]

[project.urls]
Homepage = "https://github.com/YuHao-Yeh/lattix"
Documentation = ""
Repository = ""

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true
